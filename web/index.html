<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能体控制台 · Agent Xi</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="preload" href="/fonts/zpix.ttf" as="font" type="font/ttf" crossorigin />
</head>
<body>
  <div id="app">
    <!-- ═══ 顶部状态栏 ═══════════════════════════════════════ -->
    <header id="top-bar">
      <div class="top-left">
        <span class="brand">✦ 智能体控制台</span>
      </div>
      <div class="top-center">
        <span class="status-pill pill-online">在线 <b id="cnt-online">0</b></span>
        <span class="status-pill pill-idle">待机 <b id="cnt-idle">0</b></span>
        <span class="status-pill pill-error">故障 <b id="cnt-error">0</b></span>
      </div>
      <div class="top-right">
        <span class="season" id="season-text"></span>
        <span class="clock" id="clock-text"></span>
      </div>
    </header>

    <!-- ═══ 左侧图标导航栏 ═════════════════════════════════════ -->
    <nav id="icon-nav">
      <button class="nav-icon active" data-view="console" title="控制台">
        <svg viewBox="0 0 16 16" width="20" height="20"><path d="M2 3h12v8H2z M4 13h8v1H4z" fill="currentColor"/><path d="M4 5l2 2-2 2M8 9h3" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button class="nav-icon" data-view="market" title="商店">
        <svg viewBox="0 0 16 16" width="20" height="20"><path d="M3 5h10l1 3v5H2V8l1-3z M5 5V3h6v2" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="5" cy="14" r="1" fill="currentColor"/><circle cx="11" cy="14" r="1" fill="currentColor"/></svg>
      </button>
      <button class="nav-icon" data-view="settings" title="设置">
        <svg viewBox="0 0 16 16" width="20" height="20"><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M13 3l-1.5 1.5M4.5 11.5L3 13" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </nav>

    <!-- ═══ 视图区域 ═════════════════════════════════════════ -->
    <div id="view-container">

      <!-- ─── 控制台视图（默认）─── -->
      <section id="view-console" class="view-section">
        <div id="body-area">
          <!-- 左栏 · 冒险者名册 -->
          <aside id="roster-panel">
            <div class="panel-title">✦ 冒险者名册</div>
            <div id="roster-list"></div>
          </aside>

          <!-- 中栏 · 系统日志 + 命令 -->
          <main id="log-panel">
            <div class="panel-title">✦ 系统日志</div>
            <div id="log-list"></div>

            <div id="attach-preview" hidden></div>

            <div id="command-bar">
              <span class="cmd-prompt">▶</span>
              <button id="attach-btn" class="btn-attach" title="附件（可拖拽文件到日志区）">
                <svg viewBox="0 0 24 24" width="15" height="15"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="square"/></svg>
              </button>
              <input id="command-input" type="text" placeholder="输入指令..." autocomplete="off" />
              <button id="command-exec" class="btn-exec">执行</button>
            </div>
            <div id="command-help">
              /help 全部命令 · /memory 记忆 · /skills 技能 · 回车发送 · 文件可拖入日志区
            </div>
          </main>

          <!-- 右栏 · 冒险者详情 + 任务公告板 -->
          <aside id="detail-panel">
            <div class="panel-title">✦ 冒险者详情</div>
            <div id="detail-content"></div>

            <div class="panel-title quest-title">✦ 任务公告板</div>
            <div id="quest-list"></div>
          </aside>
        </div>
      </section>

      <!-- ─── 商店视图 ─── -->
      <section id="view-market" class="view-section" hidden>
        <div class="view-placeholder">
          <div class="placeholder-icon">▣</div>
          <div class="placeholder-text">商店 · 即将开放</div>
        </div>
      </section>

      <!-- ─── 设置视图 ─── -->
      <section id="view-settings" class="view-section" hidden>
        <div class="view-placeholder">
          <div class="placeholder-icon">✧</div>
          <div class="placeholder-text">设置 · 即将开放</div>
        </div>
      </section>

    </div>

    <!-- ═══ 底部状态栏 ═══════════════════════════════════════ -->
    <footer id="bottom-bar">
      <span>◈ 控制台 v2.7 ◈</span>
      <span id="bottom-context">春季农场 · 第 12 天</span>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
